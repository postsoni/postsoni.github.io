<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC用語集 | ぽすとそに工房</title>
<meta name="description" content="ぽすとそに工房のRC用語集。ラジコンカー・飛行機・ヘリ・ドローン・エンジンなど563項目を分野・レベルで検索できる、空モノ陸モノ横断の用語辞典です。">
<meta name="robots" content="index, follow">

<!-- Favicon（本体サイトと同じものを参照） -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<!-- フォント（本体サイトと同一） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Yomogi&family=Zen+Kurenaido&family=Shippori+Antique&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#ff9a76;
  --accent-strong:#ff6b6b;
  --ink:#333;
  --ink-soft:#666;
  --ink-faint:#999;
  --panel:#ffffff;
  --soft:#fff5f0;
  --soft2:#ffe4d9;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Zen Maru Gothic',sans-serif;
  background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 50%,#ffd89b 100%);
  background-attachment:fixed;
  color:var(--ink);
  line-height:1.7;
}

/* ヘッダー */
header{
  background:white;
  border-bottom:4px solid var(--accent);
  padding:24px 16px 18px;
  text-align:center;
}
.back-link{
  display:inline-block;
  margin-bottom:10px;
  font-family:'Yomogi',cursive;
  color:var(--accent-strong);
  text-decoration:none;
  font-size:.95rem;
}
.back-link:hover{text-decoration:underline;}
h1{
  font-family:'Shippori Antique',serif;
  font-size:2rem;
  margin:.2em 0 .1em;
  background:linear-gradient(135deg,#ff6b6b 0%,#ff9a76 50%,#ffa94d 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.lead{color:var(--ink-soft);font-family:'Yomogi',cursive;font-size:.95rem;margin:.2em 0;}
.count-note{color:var(--ink-faint);font-size:.85rem;}

/* コントロール */
.wrap{max-width:920px;margin:0 auto;padding:20px 16px 60px;}
.controls{
  background:rgba(255,255,255,.95);
  border:2px dashed var(--accent);
  border-radius:15px;
  padding:18px 16px;
  margin-bottom:20px;
}
.search-box{position:relative;margin-bottom:14px;}
#searchInput{
  width:100%;
  padding:14px 44px 14px 16px;
  font-family:'Zen Maru Gothic',sans-serif;
  font-size:1.05rem;
  border:3px solid var(--accent);
  border-radius:12px;
  outline:none;
  color:var(--ink);
}
#searchInput:focus{border-color:var(--accent-strong);}
.clear-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:var(--accent);color:white;border:none;border-radius:50%;
  width:28px;height:28px;cursor:pointer;font-size:1rem;line-height:1;display:none;
}
.search-hint{font-size:.8rem;color:var(--ink-faint);margin-top:6px;}

.filter-row{margin-top:6px;}
.filter-label{
  font-family:'Yomogi',cursive;color:var(--accent-strong);
  font-size:.85rem;margin:8px 0 4px;
}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  font-family:'Zen Maru Gothic',sans-serif;
  font-size:.82rem;
  padding:5px 12px;
  border:2px solid var(--accent);
  border-radius:20px;
  background:white;
  color:var(--ink-soft);
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.chip:hover{border-color:var(--accent-strong);}
.chip.active{background:var(--accent);color:white;border-color:var(--accent);}
.chip .cnt{font-size:.72rem;opacity:.8;margin-left:3px;}

/* 結果 */
.result-count{
  font-family:'Yomogi',cursive;color:var(--ink-soft);
  font-size:.9rem;margin:4px 2px 14px;
}
.card{
  background:white;
  border:3px solid var(--accent);
  border-radius:15px;
  padding:16px 18px;
  margin-bottom:14px;
  scroll-margin-top:14px;
}
.card.flash{animation:flash 1.1s ease;}
@keyframes flash{0%{box-shadow:0 0 0 0 rgba(255,107,107,.6);}100%{box-shadow:0 0 0 14px rgba(255,107,107,0);}}
.card-head{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;margin-bottom:6px;}
.term{
  font-family:'Zen Kurenaido',cursive;
  font-size:1.35rem;color:var(--accent-strong);
}
.full{font-size:.85rem;color:var(--ink-faint);}
.badges{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;}
.badge{font-size:.72rem;padding:2px 9px;border-radius:12px;white-space:nowrap;}
.badge-cat{background:var(--soft2);color:var(--accent-strong);}
.badge-sub{background:var(--soft);color:var(--ink-soft);}
.badge-type{background:#e8f3ff;color:#3a78b5;}
.badge-level{background:#fff3d6;color:#b58a1a;}
.badge-level.basic{background:#e9f7ea;color:#3f9a4a;}
.q-line{
  font-family:'Yomogi',cursive;color:var(--accent-strong);
  background:var(--soft);border-left:4px solid var(--accent);
  padding:6px 10px;border-radius:6px;margin:0 0 8px;font-size:.95rem;
}
.def{color:var(--ink);margin:4px 0;white-space:pre-wrap;}
.related{margin-top:10px;font-size:.85rem;color:var(--ink-soft);}
.related .rlabel{font-family:'Yomogi',cursive;color:var(--accent-strong);margin-right:4px;}
.rlink{
  display:inline-block;margin:2px 4px 2px 0;padding:2px 9px;
  background:var(--soft);border:1px solid var(--accent);border-radius:12px;
  color:var(--accent-strong);cursor:pointer;font-size:.8rem;
}
.rlink:hover{background:var(--accent);color:white;}

.empty{
  text-align:center;color:var(--ink-faint);
  font-family:'Yomogi',cursive;padding:40px 10px;
}
.loading{text-align:center;color:var(--ink-soft);padding:40px;font-family:'Yomogi',cursive;}
footer{
  text-align:center;color:var(--ink-soft);font-size:.8rem;
  padding:20px;font-family:'Yomogi',cursive;
}

@media(max-width:600px){
  h1{font-size:1.55rem;}
  .term{font-size:1.2rem;}
  .badges{margin-left:0;width:100%;}
}
</style>
</head>
<body>

<header>
  <a class="back-link" href="index.html">← ぽすとそに工房 トップへ</a>
  <h1>RC用語集</h1>
  <p class="lead">ラジコンの「？」を引くための辞典 ― 陸モノ・空モノ・ヘリ横断</p>
  <p class="count-note" id="countNote">読み込み中…</p>
</header>

<div class="wrap">
  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="用語・別名・意味で検索（例：FBL / フライバーレス / かぶり）" autocomplete="off">
      <button class="clear-btn" id="clearBtn" aria-label="クリア">×</button>
    </div>
    <p class="search-hint">略称（FBL・D/R・LVCなど）や、動詞・別の言い回しでも引けます。</p>

    <p class="filter-label">分野でしぼる</p>
    <div class="chips" id="catChips"></div>

    <p class="filter-label">レベルでしぼる</p>
    <div class="chips" id="levelChips"></div>
  </div>

  <p class="result-count" id="resultCount"></p>
  <div id="results"><p class="loading">辞典を読み込んでいます…</p></div>
</div>

<footer>
  ぽすとそに工房 RC用語集 ／ 内容は一般的な解説です。法令・安全基準は最新の公式情報・自治体・クラブをご確認ください。
</footer>

<script>
let DATA=[];
let curCat="すべて";
let curLevel="すべて";
let curQuery="";

const $results=document.getElementById('results');
const $count=document.getElementById('resultCount');
const $input=document.getElementById('searchInput');
const $clear=document.getElementById('clearBtn');

// HTMLエスケープ
function esc(s){
  return String(s==null?"":s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// 読み込み
fetch('rc_yougoshu.json')
  .then(r=>{ if(!r.ok) throw new Error('JSON取得失敗 ('+r.status+')'); return r.json(); })
  .then(data=>{ DATA=data; init(); })
  .catch(err=>{
    $results.innerHTML='<p class="empty">辞典データ（rc_yougoshu.json）を読み込めませんでした。<br>'
      +'同じフォルダに rc_yougoshu.json があるか確認してください。<br><small>'+esc(err.message)+'</small></p>';
    document.getElementById('countNote').textContent='';
  });

function init(){
  document.getElementById('countNote').textContent='全 '+DATA.length+' 項目';

  // カテゴリ（出現順を維持）
  const catOrder=[]; const catCnt={};
  DATA.forEach(x=>{
    if(!catOrder.includes(x.category)) catOrder.push(x.category);
    catCnt[x.category]=(catCnt[x.category]||0)+1;
  });
  const $cat=document.getElementById('catChips');
  $cat.appendChild(makeChip('すべて',DATA.length,'cat'));
  catOrder.forEach(c=>$cat.appendChild(makeChip(c,catCnt[c],'cat')));

  // レベル
  const lvlCnt={};
  DATA.forEach(x=>{ lvlCnt[x.level]=(lvlCnt[x.level]||0)+1; });
  const $lvl=document.getElementById('levelChips');
  $lvl.appendChild(makeChip('すべて',DATA.length,'level'));
  ['基本','忘れやすい'].forEach(l=>{ if(lvlCnt[l]) $lvl.appendChild(makeChip(l,lvlCnt[l],'level')); });

  // 検索イベント
  $input.addEventListener('input',()=>{
    curQuery=$input.value.trim();
    $clear.style.display=curQuery?'block':'none';
    render();
  });
  $clear.addEventListener('click',()=>{
    $input.value="";curQuery="";$clear.style.display='none';$input.focus();render();
  });

  render();
}

function makeChip(label,cnt,group){
  const b=document.createElement('button');
  b.className='chip'+((group==='cat'&&label==='すべて')||(group==='level'&&label==='すべて')?' active':'');
  b.innerHTML=esc(label)+'<span class="cnt">'+cnt+'</span>';
  b.dataset.group=group; b.dataset.value=label;
  if(group==='cat'&&label!=='すべて') b.classList.remove('active');
  b.addEventListener('click',()=>{
    if(group==='cat'){ curCat=label; setActive('catChips',label); }
    else { curLevel=label; setActive('levelChips',label); }
    render();
  });
  return b;
}
function setActive(containerId,value){
  document.querySelectorAll('#'+containerId+' .chip').forEach(c=>{
    c.classList.toggle('active',c.dataset.value===value);
  });
}

function matchQuery(item,q){
  if(!q) return true;
  const hay=(item.term+' '+(item.full||'')+' '+(item.definition||'')+' '+(item.question||'')+' '+(item.subcategory||'')).toLowerCase();
  // スペース区切りでAND検索
  return q.toLowerCase().split(/\s+/).filter(Boolean).every(w=>hay.includes(w));
}

// 検索語との関連度スコア（高いほど上位）
function score(item,q){
  if(!q) return 0;
  const ql=q.toLowerCase();
  const term=item.term.toLowerCase();
  const full=(item.full||'').toLowerCase();
  if(term===ql) return 100;            // 用語名と完全一致
  if(term.startsWith(ql)) return 80;   // 用語名が前方一致
  if(term.includes(ql)) return 60;     // 用語名に含む
  if(full.includes(ql)) return 40;     // 正式名・別名に含む
  return 10;                            // 定義文などに含む
}

function filtered(){
  const list=DATA.filter(x=>
    (curCat==="すべて"||x.category===curCat) &&
    (curLevel==="すべて"||x.level===curLevel) &&
    matchQuery(x,curQuery)
  );
  if(curQuery){
    // 関連度で安定ソート（同点は元の掲載順を保つ）
    list.map((x,i)=>x.__i=i);
    list.sort((a,b)=>{
      const d=score(b,curQuery)-score(a,curQuery);
      return d!==0?d:a.__i-b.__i;
    });
  }
  return list;
}

function render(){
  const list=filtered();
  $count.textContent=list.length+' 件';
  if(!list.length){
    $results.innerHTML='<p class="empty">該当する用語が見つかりませんでした。<br>別の言い回しや略称でもお試しください。</p>';
    return;
  }
  $results.innerHTML=list.map(cardHTML).join('');
  // related クリック
  $results.querySelectorAll('.rlink').forEach(el=>{
    el.addEventListener('click',()=>jumpTo(el.dataset.term));
  });
}

function cardHTML(x){
  const id='term-'+encodeURIComponent(x.term);
  const levelClass=x.level==='基本'?'basic':'';
  const badges=[
    '<span class="badge badge-cat">'+esc(x.category)+'</span>',
    x.subcategory?'<span class="badge badge-sub">'+esc(x.subcategory)+'</span>':'',
    (x.type&&x.type!=='用語')?'<span class="badge badge-type">'+esc(x.type)+'</span>':'',
    '<span class="badge badge-level '+levelClass+'">'+esc(x.level)+'</span>'
  ].join('');
  const q=x.question?'<p class="q-line">Q：'+esc(x.question)+'</p>':'';
  const rel=(x.related&&x.related.length)
    ?'<div class="related"><span class="rlabel">関連</span>'
      +x.related.map(r=>'<span class="rlink" data-term="'+esc(r)+'">'+esc(r)+'</span>').join('')
      +'</div>':'';
  return '<div class="card" id="'+esc(id)+'">'
    +'<div class="card-head">'
      +'<span class="term">'+esc(x.term)+'</span>'
      +(x.full?'<span class="full">'+esc(x.full)+'</span>':'')
      +'<span class="badges">'+badges+'</span>'
    +'</div>'
    +q
    +'<p class="def">'+esc(x.definition)+'</p>'
    +rel
  +'</div>';
}

// 関連語へジャンプ（フィルタを解除して該当語を表示）
function jumpTo(term){
  const exists=DATA.some(x=>x.term===term);
  if(!exists){ return; }
  curCat="すべて";curLevel="すべて";curQuery="";
  $input.value="";$clear.style.display='none';
  setActive('catChips','すべて');setActive('levelChips','すべて');
  render();
  const id='term-'+encodeURIComponent(term);
  const el=document.getElementById(id);
  if(el){
    el.scrollIntoView({behavior:'smooth',block:'start'});
    el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');
  }
}
</script>
</body>
</html>
